*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--surface2:#f0f1f4;--border:#e4e6eb;--border2:#d0d3db;

.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f6f8 0%,#eef1fe 100%)}
.login-card{background:var(--surface);border-radius:20px;padding:2.5rem;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center;width:100%;max-width:380px}
.login-logo{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--text2);margin-bottom:1.5rem}
.login-logo span{color:var(--accent)}
.login-icon{font-size:3rem;margin-bottom:1rem}
.login-title{font-size:20px;font-weight:700;margin-bottom:.5rem}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:2rem;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.google-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(79,110,247,.2)}
.google-btn img{width:20px;height:20px}
.login-error{font-size:12px;color:var(--red);margin-top:1rem;display:none;padding:8px;background:var(--red-dim);border-radius:6px}
.app{display:none}

/* Nav */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:.875rem}
.nav-logo{font-size:13px;font-weight:700;color:var(--text2);text-decoration:none;letter-spacing:.04em}
.nav-logo span{color:var(--accent)}
.nav-divider{width:1px;height:16px;background:var(--border2)}
.nav-title{font-size:13px;font-weight:600;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.user-info{display:flex;align-items:center;gap:.5rem;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--border)}
.logout-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

.main{max-width:1400px;margin:0 auto;padding:1.5rem}

/* Alert banner */

/* Admin table */

table{width:100%;border-collapse:collapse;font-size:15px}
th{background:var(--surface2);text-align:left;color:var(--text3);font-weight:600;padding:11px 14px;border-bottom:1.5px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}

// ── 旅遊津貼計算 ──
function calcTravel(startDate, years) {
  // 週年制：滿1年後才有，每期1年
  const start = new Date(startDate);
  const today = new Date();
  // 當期起算日（最近一次週年）
  const periodStart = new Date(start);
  periodStart.setFullYear(today.getFullYear());
  if (periodStart > today) periodStart.setFullYear(today.getFullYear() - 1);
  const periodEnd = new Date(periodStart);
  periodEnd.setFullYear(periodEnd.getFullYear() + 1);

  // 未滿1年無津貼
  if (years < 1) return { domestic: 0, overseas: 0, periodStart, periodEnd, eligible: false };

  let domestic, overseas;
  if (years < 2)       { domestic = 1500;  overseas = 3000; }
  else if (years < 3)  { domestic = 3000;  overseas = 6000; }
  else                 { domestic = 12000; overseas = 24000; }

  return { domestic, overseas, periodStart, periodEnd, eligible: true };
}

// ── 天數格式化（小數 → X天X小時）──
function formatDays(d) {
  if (d === 0) return '0 天';
  const days = Math.floor(d);
  const hours = Math.round((d - days) * 8);
  if (hours === 0) return `${days} 天`;
  if (days === 0) return `${hours} 小時`;
  return `${days} 天 ${hours} 小時`;
}

// ── 特休計算（週年制，勞基法新制）──
function calcAnnualLeave(startDate) {
  const start = new Date(startDate);
  const today = new Date();
  
  // 計算總月數
  let months = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth());
  if (today.getDate() < start.getDate()) months--;
  const years = Math.floor(months / 12);
  const remMonths = months % 12;

  // 本期週年起算日
  const periodStart = new Date(start);
  periodStart.setFullYear(today.getFullYear());
  if (periodStart > today) periodStart.setFullYear(today.getFullYear() - 1);
  
  // 下次週年日
  const nextAnniv = new Date(periodStart);
  nextAnniv.setFullYear(nextAnniv.getFullYear() + 1);

  // 可休天數（勞基法第38條，週年制）
  // 滿6個月:3天, 1年:7天, 2年:10天, 3~4年:14天, 5~9年:15天, 10年起每年+1天上限30天
  let quota = 0;
  if (months < 6) quota = 0;
  else if (months < 12) quota = 3;
  else if (years < 2) quota = 7;
  else if (years < 3) quota = 10;
  else if (years < 5) quota = 14;
  else if (years < 10) quota = 15;
  else quota = Math.min(15 + (years - 9), 30);

  // 年資文字
  const yText = years > 0 ? `${years}年${remMonths}個月` : `${remMonths}個月`;
  
  // 距離週年日天數
  const daysToAnniv = Math.ceil((nextAnniv - today) / 86400000);

  // 旅遊津貼（週年制，每年一次）
  let travelDomestic = 0, travelOverseas = 0;
  if (years >= 1 && years < 2)      { travelDomestic = 1500;  travelOverseas = 3000; }
  else if (years >= 2 && years < 3) { travelDomestic = 3000;  travelOverseas = 6000; }
  else if (years >= 3)              { travelDomestic = 12000; travelOverseas = 24000; }

  return { years, months, quota, yText, periodStart, nextAnniv, daysToAnniv, travelDomestic, travelOverseas };
}

// ── 生日判斷（本月）──
function isBirthdayMonth(birthday) {
  if (!birthday) return false;
  const bday = new Date(birthday);
  const today = new Date();
  return bday.getMonth() === today.getMonth();
}

// ── Firebase 讀寫 ──
async function loadEmployees() {
  try {
    const snap = await getDoc(doc(db, 'seniority', 'employees'));
    if (snap.exists() && snap.data().list) {
      employees = JSON.parse(snap.data().list);
    } else {
      employees = DEFAULT_EMPLOYEES;
      await saveEmployees();
    }
  } catch(e) {
    employees = DEFAULT_EMPLOYEES;
  }
}

async function saveEmployees() {
  try {
    await setDoc(doc(db, 'seniority', 'employees'), {
      list: JSON.stringify(employees),
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.error(e); }
}

// ── 渲染 ──

  const myEmployee = employees.find(e => e.email === currentUser.email);

  // 生日提醒（管理員看全員，員工看自己）
  renderBirthdayBar(isAdmin ? employees : (myEmployee ? [myEmployee] : []), isAdmin);

  // 特休警示（管理員才看）
  if (isAdmin) renderAlertBar();

  // 個人卡片
  if (myEmployee) renderMyCard(myEmployee);
  else if (!isAdmin) {
    document.getElementById('my-section').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text3)">查無您的員工資料，請聯絡 HR</div>`;
  }

  // 管理員總覽
  if (isAdmin) {
    document.getElementById('admin-section').style.display = 'block';
    renderAdminTable();
  }
}

function renderBirthdayBar(list, isAdmin) {
  const bdayEls = list.filter(e => isBirthdayMonth(e.birthday));
  const bar = document.getElementById('bday-bar');
  const bdayList = document.getElementById('bday-list');
  if (!bdayEls.length) return;
  bar.classList.add('show');
  bdayList.innerHTML = bdayEls.map(e => {
    const bday = new Date(e.birthday);
    const month = bday.getMonth()+1, day = bday.getDate();
    return `<div class="bday-item">🌟 ${e.name} ${month}月${day}日生日 — 記得提醒填寫申請單！</div>`;
  }).join('');
}

function renderAlertBar() {
  const today = new Date();
  const warns = employees.filter(e => {
    if (!e.startDate) return false;
    const { quota, daysToAnniv } = calcAnnualLeave(e.startDate);
    const remaining = quota - (e.usedDays || 0);
    return daysToAnniv <= 60 && remaining > 0;
  });
  if (!warns.length) return;
  document.getElementById('alert-bar').classList.add('show');
  document.getElementById('alert-list').innerHTML = warns.map(e => {
    const { quota, daysToAnniv } = calcAnnualLeave(e.startDate);
    const remaining = quota - (e.usedDays || 0);
    return `<div class="alert-item">⚠️ <strong>${e.name}</strong> — 剩餘 <strong>${formatDays(remaining)}</strong>特休，週年日還有 ${daysToAnniv} 天</div>`;
  }).join('');
}

function renderMyCard(emp) {
  const { quota, yText, daysToAnniv, nextAnniv, travelDomestic, travelOverseas } = calcAnnualLeave(emp.startDate);
  const used = emp.usedDays || 0;
  const remaining = Math.max(0, quota - used);
  const pct = quota > 0 ? Math.round((used/quota)*100) : 0;
  const remainColor = remaining === 0 ? 'red' : remaining <= 3 ? 'orange' : 'green';
  const isBday = isBirthdayMonth(emp.birthday);
  const bday = emp.birthday ? new Date(emp.birthday) : null;

  document.getElementById('my-section').innerHTML = `
    <div class="my-card">
      <div class="my-card-header">
        <img class="my-avatar" src="${currentUser.photoURL||''}" alt="">
        <div>
          <div class="my-name">${emp.name}</div>
          <div class="my-dept">${emp.dept} · ${emp.title||''}</div>
        </div>
      </div>
      <div class="my-stats">
        <div class="stat-box">
          <div class="stat-label">到職日</div>
          <div class="stat-value" style="font-size:16px">${emp.startDate?.replace(/-/g,'/')}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">年資</div>
          <div class="stat-value" style="font-size:16px">${yText}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">本期可休</div>
          <div class="stat-value">${quota} <span style="font-size:14px;color:var(--text3)">天</span></div>
          <div class="stat-sub">週年起算制</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">已休天數</div>
          <div class="stat-value orange" style="font-size:18px">${formatDays(used)}</div>
          <div class="stat-sub">已使用 ${pct}%</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">剩餘天數</div>
          <div class="stat-value ${remainColor}" style="font-size:18px">${formatDays(remaining)}</div>
          <div class="stat-sub">週年日 ${nextAnniv.getMonth()+1}/${nextAnniv.getDate()} 還有 ${daysToAnniv} 天</div>
        </div>
      </div>
      ${ travelDomestic > 0 ? ('<div style="background:var(--accent-dim);border:1.5px solid #c7d2fe;border-radius:var(--radius-sm);padding:.75rem 1rem;margin-top:.875rem;font-size:14px">✈️ <strong>本期旅遊津貼</strong> 國內 <strong>NT$ ' + travelDomestic.toLocaleString() + '</strong> / 國外 <strong>NT$ ' + travelOverseas.toLocaleString() + '</strong></div>') : ''}
      <div class="bday-notice ${isBday?'show':''}">
        🌟 本月是您的生日月份（${bday?`${bday.getMonth()+1}月${bday.getDate()}日`:''}）！記得填寫生日假申請單。
      </div>
    </div>`;
}

function renderAdminTable() {
  const tbody = document.getElementById('admin-tbody');
  tbody.innerHTML = employees.map(e => {
    if (!e.startDate) {
      return `<tr>
        <td><strong>${e.name}</strong> <span class="badge badge-admin">管理員</span></td>
        <td colspan="10" style="color:var(--text3)">— 管理員帳號，無到職日 —</td>
        <td></td>
      </tr>`;
    }
    const { quota, yText, daysToAnniv, nextAnniv, travelDomestic, travelOverseas } = calcAnnualLeave(e.startDate);
    const used = e.usedDays || 0;
    const remaining = Math.max(0, quota - used);
    const pct = quota > 0 ? Math.round((used/quota)*100) : 0;
    const fillColor = pct >= 100 ? 'var(--red)' : pct >= 60 ? 'var(--orange)' : 'var(--green)';
    const warn = daysToAnniv <= 60 && remaining > 0;
    const isBday = isBirthdayMonth(e.birthday);

    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <strong>${e.name}</strong>
          ${isBday ? '<span style="font-size:14px" title="本月生日">🌟</span>' : ''}
        </div>
        <div style="font-size:11px;color:var(--text3)">${e.title||''}</div>
      </td>
      <td style="color:var(--text2)">${e.dept}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${e.startDate?.replace(/-/g,'/')}</td>
      <td>${yText}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)">${nextAnniv.getFullYear()}/${nextAnniv.getMonth()+1}/${nextAnniv.getDate()}</td>
      <td style="font-weight:700">${quota} 天</td>
      <td>${formatDays(used)}</td>
      <td style="font-weight:700;color:${remaining===0?'var(--red)':remaining<=3?'var(--orange)':'var(--green)'}">${formatDays(remaining)}</td>
      <td>
        <div class="leave-bar-wrap">
          <div class="leave-bar"><div class="leave-bar-fill" style="width:${Math.min(pct,100)}%;background:${fillColor}"></div></div>
          <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">${pct}%</span>
        </div>
      </td>
      <td>
        ${warn ? `<span class="tag-warn">⚠️ 剩${formatDays(remaining)} / ${daysToAnniv}天後到期</span>` : remaining===0 ? `<span class="tag-full">已休完</span>` : `<span class="tag-ok">正常</span>`}
      </td>
      <td>
        ${(()=>{
          const tv = calcTravel(e.startDate, calcAnnualLeave(e.startDate).years);
          if (!tv.eligible) return '<span style="color:var(--text3);font-size:12px">未達資格</span>';
          const periodKey = tv.periodStart.getFullYear()+'-'+tv.periodStart.getMonth();
          const claimed = (e.travelClaimed||[]).includes(periodKey);
          const pe = tv.periodEnd;
          const peStr = pe.getFullYear()+'/'+(pe.getMonth()+1)+'/'+pe.getDate();
          if (claimed) return '<span class="tag-full">已請領 ✓</span>';
          return '<div style="font-size:12px;line-height:1.8">' +
            '<div>🏠 NT$ '+tv.domestic.toLocaleString()+' / ✈️ NT$ '+tv.overseas.toLocaleString()+'</div>' +
            '<div style="color:var(--text3)">效期至 '+peStr+'</div>' +
            '<button class="edit-btn" style="margin-top:4px;font-size:11px;padding:3px 10px" onclick="markTravel(\'' + e.id + '\',\'' + periodKey + '\')">標記已請領</button>' +
            '</div>';
        })()}
      </td>
      <td>
        <button class="edit-btn" onclick="openEditModal('${e.id}')">編輯</button>
      </td>
    </tr>`;
  }).join('');
}

// ── 旅遊津貼標記 ──
window.markTravel = async (id, periodKey) => {
  const idx = employees.findIndex(e => e.id === id);
  if (idx < 0) return;
  const claimed = employees[idx].travelClaimed || [];
  if (!claimed.includes(periodKey)) {
    employees[idx].travelClaimed = [...claimed, periodKey];
    await saveEmployees();
    render();
    showToast('已標記旅遊津貼請領 ✓');
  }
};

// ── Modal ──
window.openEditModal = (id) => {
  editingId = id;
  const e = employees.find(x => x.id === id);
  if (!e) return;
  document.getElementById('modal-title-text').textContent = '編輯員工資料';
  document.getElementById('m-name').value = e.name || '';
  document.getElementById('m-dept').value = e.dept || '';
  document.getElementById('m-title').value = e.title || '';
  document.getElementById('m-start').value = e.startDate || '';
  document.getElementById('m-bday').value = e.birthday || '';
  document.getElementById('m-email').value = e.email || '';
  document.getElementById('m-used').value = e.usedDays || 0;
  document.getElementById('modal').classList.add('show');
};

window.openAddModal = () => {
  editingId = null;
  document.getElementById('modal-title-text').textContent = '新增員工';
  ['m-name','m-dept','m-title','m-start','m-bday','m-email'].forEach(id => document.getElementById(id).value='');
  document.getElementById('m-used').value = 0;
  document.getElementById('modal').classList.add('show');
};

window.closeModal = () => document.getElementById('modal').classList.remove('show');

window.saveEmployee = async () => {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('請填寫姓名'); return; }
  const data = {
    name,
    dept: document.getElementById('m-dept').value.trim(),
    title: document.getElementById('m-title').value.trim(),
    startDate: document.getElementById('m-start').value,
    birthday: document.getElementById('m-bday').value,
    email: document.getElementById('m-email').value.trim(),
    usedDays: parseFloat(document.getElementById('m-used').value) || 0,
  };
  if (editingId) {
    const idx = employees.findIndex(e => e.id === editingId);
    if (idx >= 0) employees[idx] = { ...employees[idx], ...data };
  } else {
    employees.push({ ...data, id: 'e' + Date.now() });
  }
  await saveEmployees();
  closeModal();
  render();
  showToast('已儲存 ✓');
};

// ── Auth ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
function showLoginPage() { showLoading(false); document.getElementById('login-page').style.display='flex'; document.getElementById('app').style.display='none'; }
function showApp(user) {
  showLoading(false);
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name').textContent = user.displayName || user.email;
  if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
}

onAuthStateChanged(auth, async user => {
  if (user && ALLOWED_EMAILS.includes(user.email)) {
    currentUser = user;
    showApp(user);
    await loadEmployees();
    render();
  } else if (user) {
    signOut(auth); showLoginPage();
    document.getElementById('login-error').style.display='block';
  } else {
    showLoginPage();
  }
});

window.signIn = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    if (!ALLOWED_EMAILS.includes(result.user.email)) {
      await signOut(auth);
      document.getElementById('login-error').style.display='block';
    }
  } catch(e) {
    if (e.code === 'auth/popup-blocked') {
      document.getElementById('login-error').textContent='請允許彈出視窗';
      document.getElementById('login-error').style.display='block';
    }
  }

window.claimTravel = async (id) => {
  const idx = employees.findIndex(e => e.id === id);
  if (idx < 0) return;
  employees[idx].travelClaimed = true;
  await saveEmployees();
  render();
  showToast('已標記旅遊津貼請領 ✓');
};

window.unclaimTravel = async (id) => {
  const idx = employees.findIndex(e => e.id === id);
  if (idx < 0) return;
  employees[idx].travelClaimed = false;
  await saveEmployees();
  render();
  showToast('已取消請領標記');
};

window.doSignOut = () => signOut(auth);
</script>
</body>
</html>
