<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請假簽核 — Team Gantt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--surface2:#f0f1f4;--border:#e4e6eb;--border2:#d0d3db;
  --text:#1a1d23;--text2:#5a5f6e;--text3:#9099aa;
  --accent:#4f6ef7;--accent-dim:#eef1fe;
  --green:#2e9e6b;--green-dim:#ebf7f2;
  --orange:#e8622a;--orange-dim:#fdf0eb;
  --red:#e53935;--red-dim:#fef2f2;
  --purple:#7c3aed;--purple-dim:#f5f3ff;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.05);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:15px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:999}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f6f8 0%,#eef1fe 100%)}
.login-card{background:var(--surface);border-radius:20px;padding:2.5rem;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center;width:100%;max-width:380px}
.login-logo{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--text2);margin-bottom:1.5rem}
.login-logo span{color:var(--accent)}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--accent)}
.google-btn img{width:20px;height:20px}
.login-error{font-size:12px;color:var(--red);margin-top:1rem;display:none;padding:8px;background:var(--red-dim);border-radius:6px}
.app{display:none}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:.875rem}
.nav-logo{font-size:13px;font-weight:700;color:var(--text2);text-decoration:none;letter-spacing:.04em}
.nav-logo span{color:var(--accent)}
.nav-divider{width:1px;height:16px;background:var(--border2)}
.nav-title{font-size:13px;font-weight:600}
.nav-right{display:flex;align-items:center;gap:.75rem}
.user-info{display:flex;align-items:center;gap:.5rem;font-size:13px;color:var(--text2)}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--border)}
.logout-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer}
.badge-dot{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
.main{padding:1.5rem 2rem}
/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;margin-bottom:1.25rem;width:fit-content}
.tab{padding:8px 20px;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);font-weight:600}
/* Apply form */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);max-width:680px}
.field{margin-bottom:1rem}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
label{display:block;font-size:12px;color:var(--text3);font-weight:600;margin-bottom:5px;letter-spacing:.03em}
input,select,textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
textarea{resize:vertical;min-height:80px}
.duration-hint{font-size:12px;color:var(--accent);margin-top:4px;font-weight:600;min-height:18px}
.submit-btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:.5rem}
.remaining-hint{background:var(--surface2);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;color:var(--text2);display:none}
.remaining-hint.show{display:block}
/* Calendar */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
.cal-nav-btn{background:none;border:1.5px solid var(--border2);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-month-title{font-size:18px;font-weight:700}
.cal-controls{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.cal-person-filter{padding:6px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);font-size:13px;color:var(--text);outline:none;cursor:pointer}
.cal-legend{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:8px 4px;letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:6px 5px;position:relative;background:var(--surface);transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:#fafafa}
.cal-cell.today{background:#f0f4ff}
.cal-date{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.cal-date.today-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-event{font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s;line-height:1.4}
.cal-event:hover{opacity:.8}
.ev-approved{background:#d1fae5;color:#065f46}
.ev-pending{background:#fed7aa;color:#92400e}
.ev-pending_m1{background:#fed7aa;color:#92400e}
.ev-pending_m2{background:#fde68a;color:#854d0e}
.ev-agent_pending{background:#dbeafe;color:#1e40af}
.ev-rejected{background:#fee2e2;color:#991b1b}
.ev-cancelled{background:var(--surface2);color:var(--text3)}
.cal-more{font-size:10px;color:var(--text3);padding:1px 4px;cursor:pointer}
/* Day modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.45);z-index:50;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:1.5rem;width:100%;max-width:520px;box-shadow:0 24px 60px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)}
.leave-item{background:var(--surface2);border-radius:10px;padding:1rem;margin-bottom:.75rem;border-left:4px solid transparent}
.leave-item.approved{border-color:var(--green)}
.leave-item.pending_m1{border-color:var(--orange)}
.leave-item.pending_m2{border-color:#eab308}
.leave-item.pending{border-color:var(--orange)}
.leave-item.agent_pending{border-color:#3b82f6}
.leave-item.rejected{border-color:var(--red)}
.leave-item.cancelled{border-color:var(--border2)}
.li-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem}
.li-name{font-size:15px;font-weight:700}
.li-type{font-size:12px;padding:2px 9px;border-radius:20px;font-weight:700}
.type-特休{background:var(--accent-dim);color:var(--accent)}
.type-事假{background:var(--orange-dim);color:var(--orange)}
.type-病假{background:var(--red-dim);color:var(--red)}
.type-家庭照顧假{background:var(--purple-dim);color:var(--purple)}
.li-time{font-size:12px;color:var(--text2);margin-bottom:3px}
.li-days{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.li-reason{font-size:12px;color:var(--text3)}
.li-status{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.s-approved{background:var(--green-dim);color:var(--green)}
.s-pending{background:#fef3c7;color:#92400e}
.s-pending_m1{background:#fef3c7;color:#92400e}
.s-pending_m2{background:#fef9c3;color:#854d0e}
.s-agent_pending{background:#dbeafe;color:#1e40af}
.s-rejected{background:var(--red-dim);color:var(--red)}
.s-cancelled{background:var(--surface2);color:var(--text3)}
.li-actions{display:flex;gap:.5rem;margin-top:.625rem}
.btn-approve{padding:5px 16px;border-radius:20px;border:none;background:var(--green);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.btn-reject{padding:5px 16px;border-radius:20px;border:none;background:var(--red-dim);color:var(--red);font-size:12px;font-weight:700;cursor:pointer;border:1px solid #fca5a5}
.btn-cancel{padding:5px 16px;border-radius:20px;border:none;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer}
/* My leaves list */
.leave-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.625rem;box-shadow:var(--shadow)}
.status-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.status-pending{background:#fef3c7;color:#92400e}
.status-approved{background:var(--green-dim);color:var(--green)}
.status-rejected{background:var(--red-dim);color:var(--red)}
.cancel-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer}
.empty{text-align:center;padding:3rem;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
/* Agent section */
.agent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.625rem;box-shadow:var(--shadow)}
.btn-agree{padding:6px 16px;border-radius:20px;border:none;background:var(--green);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.btn-decline{padding:6px 16px;border-radius:20px;border:none;background:var(--red-dim);color:var(--red);font-size:12px;font-weight:700;cursor:pointer}
/* Reject modal */
.btn-danger{padding:10px 20px;border-radius:var(--radius-sm);border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.modal-actions{display:flex;gap:8px;margin-top:1rem}
.btn-secondary{padding:10px 16px;border-radius:var(--radius-sm);border:none;background:var(--surface2);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);border-radius:var(--radius);padding:10px 18px;font-size:13px;color:#fff;opacity:0;transition:all .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div> 載入中...</div>
<div class="login-page" id="login-page" style="display:none">
  <div class="login-card">
    <div class="login-logo"><span>TEAM</span> GANTT</div>
    <div style="font-size:3rem;margin-bottom:1rem">📅</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:.5rem">請假簽核系統</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:2rem">請使用公司 Google 帳號登入</div>
    <button class="google-btn" onclick="signIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">使用 Google 帳號登入
    </button>
    <div class="login-error" id="login-error">此帳號無使用權限</div>
  </div>
</div>
<div class="app" id="app">
  <nav>
    <div class="nav-left">
      <a class="nav-logo" href="home.html">← <span>TEAM</span> GANTT</a>
      <div class="nav-divider"></div>
      <span class="nav-title">請假簽核</span>
    </div>
    <div class="nav-right">
      <a href="seniority.html" style="font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);text-decoration:none;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">📊 同仁年資</a>
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
      <button class="logout-btn" onclick="doSignOut()">登出</button>
    </div>
  </nav>
  <div class="main">
    <div class="tabs">
      <button class="tab active" id="tab-apply" onclick="switchTab('apply')">📝 申請假單</button>
      <button class="tab" id="tab-my" onclick="switchTab('my')">📋 我的假單</button>
      <button class="tab" id="tab-agent" onclick="switchTab('agent')">🤝 代理確認 <span class="badge-dot" id="agent-count" style="display:none"></span></button>
      <button class="tab" id="tab-m1" onclick="switchTab('m1')">📌 副理簽核 <span class="badge-dot" id="m1-count" style="display:none"></span></button>
      <button class="tab" id="tab-m2" onclick="switchTab('m2')">📌 經理簽核 <span class="badge-dot" id="m2-count" style="display:none"></span></button>
      <button class="tab" id="tab-cal" onclick="switchTab('cal')">📅 月曆總覽</button>
    </div>

    <!-- 申請假單 -->
    <div id="section-apply">
      <div class="form-card">
        <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem">新增假單</div>
        <div class="remaining-hint" id="remaining-hint"></div>
        <div class="field">
          <label>假別</label>
          <select id="f-type" onchange="onTypeChange()">
            <option>特休</option><option>事假</option><option>病假</option>
            <option>家庭照顧假</option><option>婚假</option><option>喪假</option>
            <option>補休</option><option>其他</option>
          </select>
        </div>
        <div class="field-row">
          <div><label>開始時間</label><input type="datetime-local" id="f-start" value="" onchange="onStartChange()"></div>
          <div><label>結束時間</label><input type="datetime-local" id="f-end" value="" onchange="calcDuration()"></div>
        </div>
        <div class="duration-hint" id="duration-hint"></div>
        <div class="field"><label>事由</label><textarea id="f-reason" placeholder="請假原因..."></textarea></div>
        <div class="field-row">
          <div><label>代理人一</label><select id="f-agent"><option value="">-- 選擇 --</option></select></div>
          <div><label>代理人二（選填）</label><select id="f-agent2"><option value="">-- 不需要 --</option></select></div>
        </div>
        <div class="field"><label>附件說明</label><input type="text" id="f-attachment" placeholder="如有診斷證明等請說明"></div>
        <button class="submit-btn" onclick="submitLeave()">送出申請</button>
      </div>
    </div>

    <!-- 我的假單 -->
    <div id="section-my" style="display:none">
      <div id="my-list"></div>
    </div>

    <!-- 代理確認 -->
    <div id="section-agent" style="display:none">
      <div id="agent-list"></div>
    </div>

    <!-- 待副理簽核 -->
    <div id="section-m1" style="display:none">
      <div id="m1-list"></div>
    </div>

    <!-- 待經理簽核 -->
    <div id="section-m2" style="display:none">
      <div id="m2-list"></div>
    </div>

    <!-- 月曆總覽 -->
    <div id="section-cal" style="display:none">
      <div class="cal-wrap">
        <div class="cal-header">
          <div style="display:flex;align-items:center;gap:.75rem">
            <button class="cal-nav-btn" onclick="calPrev()">‹</button>
            <span class="cal-month-title" id="cal-title"></span>
            <button class="cal-nav-btn" onclick="calNext()">›</button>
            <button class="cal-nav-btn" onclick="calToday()" style="width:auto;padding:0 10px;font-size:12px;font-weight:700">今天</button>
          </div>
          <div class="cal-controls">
            <select class="cal-person-filter" id="cal-person" onchange="renderCalendar()">
              <option value="">所有人員</option>
            </select>
            <div class="cal-legend">
              <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>已核准</div>
              <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>待副理</div>
              <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>待經理</div>
              <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>待代理</div>
              <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>已退回</div>
            </div>
          </div>
        </div>
        <div class="cal-grid-header">
          <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
          <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="day-modal-title"></span>
      <button class="modal-close" onclick="closeDayModal()">✕</button>
    </div>
    <div id="day-modal-body"></div>
    <div style="margin-top:.75rem;text-align:right">
      <button class="btn-secondary" onclick="closeDayModal()">關閉</button>
    </div>
  </div>
</div>

<!-- Edit Leave Time Modal -->
<div class="modal-overlay" id="edit-leave-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="edit-leave-title">修改假單時間</span>
      <button class="modal-close" onclick="closeEditLeaveModal()">✕</button>
    </div>
    <div id="edit-leave-info" style="font-size:13px;color:var(--text2);margin-bottom:1rem"></div>
    <label>開始時間</label>
    <input type="datetime-local" id="edit-start" style="margin-bottom:.75rem">
    <label>結束時間</label>
    <input type="datetime-local" id="edit-end" style="margin-bottom:.75rem">
    <div class="duration-hint" id="edit-duration-hint"></div>
    <div class="modal-actions" style="margin-top:.75rem">
      <button class="btn-save" onclick="saveEditLeave()" style="padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer">儲存</button>
      <button class="btn-secondary" onclick="closeEditLeaveModal()">取消</button>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal-overlay" id="reject-modal">
  <div class="modal">
    <div class="modal-title">退回假單 <button class="modal-close" onclick="closeRejectModal()">✕</button></div>
    <label>退回原因（選填）</label>
    <textarea id="reject-reason" rows="3" style="margin-top:6px"></textarea>
    <div class="modal-actions">
      <button class="btn-danger" onclick="confirmReject()">確認退回</button>
      <button class="btn-secondary" onclick="closeRejectModal()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

function formatDays(d) {
  if (!d) return '0 天';
  const days = Math.floor(d);
  const hrsRaw = (d - days) * 8;
  const hrs = Math.round(hrsRaw * 2) / 2; // 精確到0.5小時
  if (hrs === 0) return days + ' 天';
  if (days === 0) return hrs + ' 小時';
  return days + ' 天 ' + hrs + ' 小時';
}

function fmtTime(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fmtDate(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
}

function calcLeaveDays(start, end) {
  if (!start||!end) return 0;
  const s=new Date(start), e=new Date(end);
  if (e<=s) return 0;
  let totalHours=0, cur=new Date(s);
  while (cur<e) {
    const ds=new Date(cur); ds.setHours(0,0,0,0);
    const de=new Date(cur); de.setHours(23,59,59,999);
    const rs=cur>ds?cur:ds, re=e<de?e:de;
    const amS=new Date(ds); amS.setHours(9,0,0,0);
    const amE=new Date(ds); amE.setHours(12,0,0,0);
    const pmS=new Date(ds); pmS.setHours(13,0,0,0);
    const pmE=new Date(ds); pmE.setHours(18,0,0,0);
    const aS=Math.max(rs,amS), aE=Math.min(re,amE); if (aE>aS) totalHours+=(aE-aS)/3600000;
    const pS=Math.max(rs,pmS), pE=Math.min(re,pmE); if (pE>pS) totalHours+=(pE-pS)/3600000;
    cur=new Date(ds); cur.setDate(cur.getDate()+1); cur.setHours(0,0,0,0);
  }
  return Math.round(totalHours/8*8)/8;
}

function calcQuotaAt(startDate, refDate) {
  if (!startDate) return 0;
  const start=new Date(startDate), ref=new Date(refDate);
  let months=(ref.getFullYear()-start.getFullYear())*12+(ref.getMonth()-start.getMonth());
  if (ref.getDate()<start.getDate()) months--;
  const years=Math.floor(months/12);
  if (months<6) return 0; if (months<12) return 3;
  if (years<2) return 7; if (years<3) return 10;
  if (years<5) return 14; if (years<10) return 15;
  return Math.min(15+(years-9),30);
}
function calcQuota(startDate) { return calcQuotaAt(startDate, new Date()); }

// ── 週年期別判斷（與 seniority.html 一致：依到職日 + 任一參考日，回傳該期起算年份字串，如 '2025'）──
function getPeriodKey(empStartDate, refDate) {
  const start = new Date(empStartDate);
  const ref = new Date(refDate);
  const ps = new Date(start);
  ps.setFullYear(ref.getFullYear());
  if (ps > ref) ps.setFullYear(ref.getFullYear() - 1);
  return String(ps.getFullYear());
}

// 取得員工在指定週年期內，已休天數加總（依每筆紀錄的實際日期判斷所屬期別）
function getUsedDaysForPeriod(emp, periodKey) {
  if (!Array.isArray(emp.leaveHistory)) return 0;
  return Math.round(emp.leaveHistory
    .filter(r => r.date && getPeriodKey(emp.startDate, r.date) === periodKey)
    .reduce((s, r) => s + (parseFloat(r.days) || 0), 0) * 1000) / 1000;
}

function setDefaultTimes() {

function updateRemainingHint() {
  const type=document.getElementById('f-type').value;
  const hint=document.getElementById('remaining-hint');
  if (type==='特休') {
    const emp=getMyEmployee();
    if (emp) {
      const startVal = document.getElementById('f-start').value;
      const refDate = startVal ? new Date(startVal) : new Date();
      const periodKey = getPeriodKey(emp.startDate, refDate);
      const curPeriodKey = getPeriodKey(emp.startDate, new Date());
      const used = getUsedDaysForPeriod(emp, periodKey);
      const quota = calcQuotaAt(emp.startDate, refDate);
      const remaining = Math.max(0, quota - used);
      const periodNote = periodKey !== curPeriodKey ? '　<span style="color:var(--accent)">（屬於 '+periodKey+' 期，非本期）</span>' : '';
      hint.innerHTML='🏖️ '+periodKey+'期特休剩餘：<strong>'+formatDays(remaining)+'</strong>'+periodNote;
      hint.classList.add('show');
    }
  } else { hint.classList.remove('show'); }
}

window.submitLeave = async () => {
  const type=document.getElementById('f-type').value;
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const reason=document.getElementById('f-reason').value.trim();
  const agent=document.getElementById('f-agent').value;
  const agent2=document.getElementById('f-agent2').value;
  const attachment=document.getElementById('f-attachment').value.trim();
  if (!start||!end) { showToast('請填寫請假時間'); return; }
  const days=calcLeaveDays(start,end);
  if (days<=0) { showToast('結束時間必須晚於開始時間'); return; }
  if (!agent) { showToast('請選擇代理人一'); return; }
  if (type==='特休') {
    const emp=getMyEmployee();
    if (emp) {
      const periodKey = getPeriodKey(emp.startDate, start);
      const quota = calcQuotaAt(emp.startDate, new Date(start));
      const used = getUsedDaysForPeriod(emp, periodKey);
      const remaining = Math.max(0, quota - used);
      if (days>remaining) { showToast(periodKey+'期特休不足！剩餘'+formatDays(remaining)); return; }
    }
  }
  const agentEmp=employees.find(e=>e.email===agent);
  const agentEmp2=agent2?employees.find(e=>e.email===agent2):null;
  const myEmp=getMyEmployee();
  try {
    // HR 帳號測試用：直接跳至經理簽核
    const initStatus = isViewer() ? 'pending_m2' : 'agent_pending';
    await addDoc(collection(db,'leaves'),{
      applicantEmail:currentUser.email, applicantName:myEmp?.name||currentUser.displayName,
      applicantDept:myEmp?.dept||'', type, start, end, days, reason,
      agent, agentName:agentEmp?.name||agent,
      agent2:agent2||'', agentName2:agentEmp2?.name||'',
      attachment, status:initStatus, agentStatus:'agreed',
      agent2Status:agent2?'agreed':'na',
      createdAt:new Date().toISOString(), reviewNote:'', reviewedBy:'', reviewedAt:''
    });
    showToast('假單已送出 ✓');
    ['f-reason','f-attachment'].forEach(id=>document.getElementById(id).value='');
    setDefaultTimes();
    await loadLeaves();
    updateAgentCount();
  } catch(e) { showToast('送出失敗'); }
};

function renderCalendar() {
  const filterEmail=document.getElementById('cal-person')?.value||'';
  const title=document.getElementById('cal-title');
  title.textContent=calYear+'年 '+(calMonth+1)+'月';

  const grid=document.getElementById('cal-grid');
  const today=new Date();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  // Filter leaves for this month (include multi-day spanning)
  const monthLeaves=leaves.filter(l=>{
    if (filterEmail && l.applicantEmail!==filterEmail) return false;
    if (l.status==='cancelled') return false;
    const s=new Date(l.start), e=new Date(l.end||l.start);
    const mStart=new Date(calYear,calMonth,1);
    const mEnd=new Date(calYear,calMonth+1,0,23,59);
    return s<=mEnd && e>=mStart;
  });

  // Build day→leaves map
  const dayMap={};
  monthLeaves.forEach(l=>{
    const s=new Date(l.start), e=new Date(l.end||l.start);
    for (let d=new Date(calYear,calMonth,1);d<=new Date(calYear,calMonth+1,0);d.setDate(d.getDate()+1)) {
      const dd=d.getDate();
      const dayStart=new Date(calYear,calMonth,dd,0,0);
      const dayEnd=new Date(calYear,calMonth,dd,23,59);
      if (s<=dayEnd && e>=dayStart) {
        if (!dayMap[dd]) dayMap[dd]=[];
        dayMap[dd].push(l);
      }
    }
  });

  let html='';
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let i=0;i<totalCells;i++) {
    let day, isOther=false;
    if (i<firstDay) { day=daysInPrev-firstDay+i+1; isOther=true; }
    else if (i>=firstDay+daysInMonth) { day=i-firstDay-daysInMonth+1; isOther=true; }
    else { day=i-firstDay+1; }

    const isToday=!isOther&&day===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const dayLeaves=isOther?[]:(dayMap[day]||[]);
    const maxShow=3;
    const shown=dayLeaves.slice(0,maxShow);
    const more=dayLeaves.length-maxShow;

    html+=`<div class="cal-cell${isOther?' other-month':''}${isToday?' today':''}" onclick="${!isOther&&dayLeaves.length?'openDayModal('+calYear+','+(calMonth)+','+day+')':''}" style="${!isOther&&dayLeaves.length?'cursor:pointer':''}">`;
    html+=`<div class="cal-date"><span class="${isToday?'today-num':''}">${day}</span></div>`;
    shown.forEach(l=>{
      const isFullDay=l.days>=1;
      const timeStr=isFullDay?'全天':fmtTime(l.start)+'~'+fmtTime(l.end);
      const name=l.applicantName||'';
      const evClass='ev-'+(l.status==='pending'?'pending_m1':l.status);
      html+=`<div class="cal-event ${evClass}" title="${name} ${l.type} ${timeStr}">${name} ${l.type}<span style="opacity:.7;font-size:10px"> ${timeStr}</span></div>`;
    });
    if (more>0) html+=`<div class="cal-more">+${more} 筆</div>`;
    html+='</div>';
  }
  grid.innerHTML=html;
}

window.openDayModal = (y,m,d) => {

  const dayLeaves=leaves.filter(l=>{
    if (filterEmail && l.applicantEmail!==filterEmail) return false;
    if (l.status==='cancelled') return false;
    const s=new Date(l.start), e=new Date(l.end||l.start);
    const dayStart=new Date(y,m,d,0,0), dayEnd=new Date(y,m,d,23,59);
    return s<=dayEnd && e>=dayStart;
  });
  document.getElementById('day-modal-title').textContent=y+'/'+(m+1)+'/'+d+' 假單';
  document.getElementById('day-modal-body').innerHTML=dayLeaves.map(l=>{
    const isFullDay=l.days>=1;
    const timeStr=isFullDay?'全天':fmtTime(l.start)+'～'+fmtTime(l.end);

    const canApprove=(isManager1()&&l.status==='pending_m1')||(isManager2()&&l.status==='pending_m2')||(isViewer()&&['pending_m1','pending_m2'].includes(l.status));

    return `<div class="leave-item ${l.status}">
      <div class="li-top">
        <span class="li-name">${l.applicantName||''}</span>
        <span class="li-type type-${l.type||'其他'}">${l.type||''}</span>
      </div>
      <div class="li-time">⏰ ${timeStr}</div>
      <div class="li-days">${formatDays(l.days)}</div>
      ${l.reason?'<div class="li-reason">💬 '+l.reason+'</div>':''}
      <div style="margin-top:4px"><span class="li-status s-${l.status}">${sLabel}</span>${statusNote}${l.agentName?' <span style="font-size:11px;color:var(--text3)">代理：'+l.agentName+(l.agentName2?' / '+l.agentName2:'')+'</span>':''}</div>
      ${adminBtns}

    </div>`;
  }).join('')||'<div style="text-align:center;padding:1rem;color:var(--text3)">無假單</div>';
  document.getElementById('day-modal').classList.add('show');

function updateEditDuration() {
  const days = calcLeaveDays(document.getElementById('edit-start').value, document.getElementById('edit-end').value);
  document.getElementById('edit-duration-hint').textContent = days > 0 ? '請假時數：' + formatDays(days) : '';
}
window.closeEditLeaveModal = () => {
  document.getElementById('edit-leave-modal').classList.remove('show');
  editingLeaveId = null;
};
window.saveEditLeave = async () => {
  const start = document.getElementById('edit-start').value;
  const end = document.getElementById('edit-end').value;
  if (!start || !end) { showToast('請填寫時間'); return; }
  const days = calcLeaveDays(start, end);
  if (days <= 0) { showToast('結束時間必須晚於開始時間'); return; }
  await updateDoc(doc(db, 'leaves', editingLeaveId), { start, end, days });
  showToast('時間已更新 ✓');
  closeEditLeaveModal();
  await loadLeaves();
  renderCalendar();
  closeDayModal();
};

window.calPrev = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
window.calNext = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
window.calToday = () => { const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth(); renderCalendar(); };

// ── 核准/退回 ──
window.approveLeave = async (id) => {
  const leave=leaves.find(l=>l.id===id);
  if (!leave) return;
  let newStatus;
  if (isManager1() && leave.status==='pending_m1') {
    newStatus='pending_m2'; // 副理簽完→等經理
  } else if (isManager2() && leave.status==='pending_m2') {
    newStatus='approved';   // 經理簽完→核准
  } else if (isViewer() && ['pending_m1','pending_m2'].includes(leave.status)) {
    newStatus='approved';   // HR/協理直接核准
  } else {
    showToast('您沒有簽核此假單的權限'); return;
  }
  const signKey = isManager1()?'manager1':isManager2()?'manager2':'hr';
  await updateDoc(doc(db,'leaves',id),{
    status:newStatus,
    [`${signKey}SignedBy`]:currentUser.displayName||currentUser.email,
    [`${signKey}SignedAt`]:new Date().toISOString(),
  });
  if (newStatus==='approved' && leave.type==='特休') await updateUsedDays(leave.applicantEmail,leave.days,leave.start,leave.type);
  if (newStatus==='approved') await createCalendarEvent(leave);
  showToast('已核准 ✓');
  await loadLeaves();
  updateManagerCounts();
  renderCalendar();
  closeDayModal();
};

window.approveFromAll = (id) => window.approveLeave(id);

window.openRejectModal = (id) => { rejectingId=id; document.getElementById('reject-modal').classList.add('show'); };
window.closeRejectModal = () => { document.getElementById('reject-modal').classList.remove('show'); rejectingId=null; };
window.confirmReject = async () => {
  if (!rejectingId) return;
  const note=document.getElementById('reject-reason').value.trim();
  await updateDoc(doc(db,'leaves',rejectingId),{status:'rejected',reviewNote:note,reviewedBy:currentUser.displayName||currentUser.email,reviewedAt:new Date().toISOString()});
  showToast('已退回');
  closeRejectModal();
  document.getElementById('reject-reason').value='';
  await loadLeaves();
  renderCalendar();
  closeDayModal();
};

async function createCalendarEvent(leave) {
  try {
    const WORKER_URL = 'https://api-proxy.vivi7733421.workers.dev';
    const ALL_EMAILS = [
      'mimo.jsm@gmail.com','amy.ete@gmail.com','am578222@gmail.com',
      'annie907120@gmail.com','bellsugar@gmail.com','maggie80405@gmail.com',
      'miemie686@gmail.com','s0912656315@gmail.com','teresaho0901@gmail.com',
      'vivi7733421@gmail.com','webview168@gmail.com'
    ];

    // 組合事件標題：玉如特休(代:丁+慧)09:00-18:00
    const sTime = fmtTime(leave.start);
    const eTime = fmtTime(leave.end);
    const isFullDay = leave.days >= 1;
    const agentPart = leave.agentName
      ? '(代:' + (leave.agentName.slice(-1)) + (leave.agentName2 ? '+' + leave.agentName2.slice(-1) : '') + ')'
      : '';
    const timePart = isFullDay ? '' : sTime + '-' + eTime;
    const title = (leave.applicantName||'').slice(-2) + leave.type + agentPart + (timePart ? timePart : '');

    // 建立事件物件
    let eventObj;
    if (isFullDay) {
      const startDate = leave.start ? leave.start.slice(0,10) : '';
      const endDate = leave.end ? leave.end.slice(0,10) : '';
      // 全天事件結束日要加一天
      const endDateObj = new Date(endDate);
      endDateObj.setDate(endDateObj.getDate()+1);
      const endDateStr = endDateObj.toISOString().slice(0,10);
      eventObj = {
        summary: title,
        start: { date: startDate, timeZone: 'Asia/Taipei' },
        end: { date: endDateStr, timeZone: 'Asia/Taipei' },
        attendees: ALL_EMAILS.map(e => ({ email: e })),
        description: `假別：${leave.type}\n請假人：${leave.applicantName}\n事由：${leave.reason||'—'}\n代理人：${leave.agentName||'—'}${leave.agentName2?' / '+leave.agentName2:''}`,
      };
    } else {
      eventObj = {
        summary: title,
        start: { dateTime: new Date(leave.start).toISOString(), timeZone: 'Asia/Taipei' },
        end: { dateTime: new Date(leave.end).toISOString(), timeZone: 'Asia/Taipei' },
        attendees: ALL_EMAILS.map(e => ({ email: e })),
        description: `假別：${leave.type}\n請假人：${leave.applicantName}\n事由：${leave.reason||'—'}\n代理人：${leave.agentName||'—'}${leave.agentName2?' / '+leave.agentName2:''}`,
      };
    }

    const res = await fetch(`${WORKER_URL}/calendar-event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: eventObj })
    });
    const data = await res.json();
    if (data.id) {
      console.log('行事曆事件已建立：', data.htmlLink);
    } else {
      console.error('行事曆建立失敗：', data);
    }
  } catch(e) {
    console.error('行事曆錯誤：', e);
  }
}

async function updateUsedDays(email, days, leaveStartDate, leaveType) {
  if (!email) return;
  try {
    const snap=await getDoc(doc(db,'seniority','employees'));
    if (!snap.exists()) return;
    const emps=JSON.parse(snap.data().list);
    const idx=emps.findIndex(e=>e.email===email);
    if (idx<0) return;
    const emp = emps[idx];
    if (!Array.isArray(emp.leaveHistory)) emp.leaveHistory = [];
    const dateOnly = (leaveStartDate || new Date().toISOString()).split('T')[0];
    emp.leaveHistory.push({ date: dateOnly, days, note: leaveType || '特休', addedAt: new Date().toISOString() });
    // usedDays（舊欄位）僅作全期總和參考，實際額度判斷一律以 leaveHistory + 週年期計算
    emp.usedDays = Math.round(emp.leaveHistory.reduce((s, r) => s + (parseFloat(r.days) || 0), 0) * 1000) / 1000;
    await setDoc(doc(db,'seniority','employees'),{list:JSON.stringify(emps),updatedAt:new Date().toISOString()});
  } catch(e) { console.error(e); }
}

function updateManagerCounts() {

  const m1=document.getElementById('m1-count');

  if (m1count>0){m1.textContent=m1count;m1.style.display='inline-flex';}else{m1.style.display='none';}

  const m2=document.getElementById('m2-count');
  const m2count=leaves.filter(l=>l.status==='pending_m2').length;
  if (m2count>0){m2.textContent=m2count;m2.style.display='inline-flex';}else{m2.style.display='none';}

function renderSignList(status, containerId) {
  const list=leaves.filter(l=>l.status===status);
  const wrap=document.getElementById(containerId);
  if (!list.length) {
    wrap.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div>目前沒有待簽核的假單</div></div>';
    return;
  }
  const label=status==='pending_m1'?'副理':'經理';
  wrap.innerHTML=list.map(l=>{
    const sDate=fmtDate(l.start), eDate=fmtDate(l.end);
    const sTime=fmtTime(l.start), eTime=fmtTime(l.end);
    const dateStr=sDate===eDate?sDate+' '+sTime+'～'+eTime:sDate+' '+sTime+' ～ '+eDate+' '+eTime;
    const canApproveThis = status==='pending_m1'
      ? (isManager1() || isViewer())
      : (isManager2() || isViewer());
    const actionBtns = canApproveThis
      ? '<div style="display:flex;gap:.5rem"><button class="btn-approve" onclick="approveLeave(\''+l.id+'\')">核准</button><button class="btn-reject" onclick="openRejectModal(\''+l.id+'\')">退回</button></div>'
      : '<span style="font-size:12px;color:var(--text3)">檢視模式</span>';
    return `<div class="leave-card" style="border-left:4px solid ${status==='pending_m1'?'var(--orange)':'#eab308'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem">
        <div>
          <span style="font-size:15px;font-weight:700">${l.applicantName||''}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:.5rem">${l.applicantDept||''}</span>
        </div>
        <span class="status-badge status-pending">待${label}簽核</span>
      </div>
      <div style="font-size:13px;margin-bottom:4px"><strong>${l.type}</strong> · ${formatDays(l.days)}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">📅 ${dateStr}</div>
      ${l.reason?'<div style="font-size:12px;color:var(--text3);margin-bottom:.625rem">💬 '+l.reason+'</div>':''}
      <div style="font-size:11px;color:var(--text3);margin-bottom:.625rem">代理：${l.agentName||'—'}${l.agentName2?' / '+l.agentName2:''}</div>
      ${actionBtns}
    </div>`;
  }).join('');
}

function renderAllLeaves() {
  const personFilter = document.getElementById('all-person-filter')?.value || '';
  const statusFilter = document.getElementById('all-status-filter')?.value || '';
  let list = leaves.filter(l => l.status !== 'cancelled');
  if (personFilter) list = list.filter(l => l.applicantEmail === personFilter);
  if (statusFilter) list = list.filter(l => l.status === statusFilter);
  list.sort((a,b) => new Date(b.start) - new Date(a.start));
  const wrap = document.getElementById('all-list');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div>沒有符合條件的假單</div></div>';
    return;
  }
  wrap.innerHTML = list.map(l => {
    const sDate=fmtDate(l.start), eDate=fmtDate(l.end);
    const sTime=fmtTime(l.start), eTime=fmtTime(l.end);
    const dateStr=sDate===eDate?sDate+' '+sTime+'～'+eTime:sDate+' '+sTime+' ～ '+eDate+' '+eTime;
    const canApproveThis = (isManager1()&&l.status==='pending_m1')||(isManager2()&&l.status==='pending_m2');
    const actionBtns = canApproveThis
      ? `<div style="display:flex;gap:.5rem;margin-top:.625rem">
          <button class="btn-approve" onclick="approveFromAll('${l.id}')">核准</button>
          <button class="btn-reject" onclick="openRejectModal('${l.id}')">退回</button>
        </div>` : '';
    const borderColor = l.status==='approved'?'var(--green)':l.status==='pending_m1'?'var(--orange)':l.status==='pending_m2'?'#eab308':l.status==='agent_pending'?'#3b82f6':l.status==='rejected'?'var(--red)':'var(--border)';
    return `<div class="leave-card" style="border-left:4px solid ${borderColor}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem">
        <div>
          <span style="font-size:15px;font-weight:700">${l.applicantName||''}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:.5rem">${l.applicantDept||''}</span>
        </div>
        <span class="status-badge ${statusClass(l.status)}">${statusText(l.status)}</span>
      </div>
      <div style="font-size:13px;margin-bottom:4px"><strong>${l.type}</strong> · ${formatDays(l.days)}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">📅 ${dateStr}</div>
      ${l.reason?'<div style="font-size:12px;color:var(--text3)">💬 '+l.reason+'</div>':''}
      ${actionBtns}
    </div>`;
  }).join('');
}

window.switchTab = (tab) => {
  ['apply','my','agent','m1','m2','cal'].forEach(t=>{
    const sec=document.getElementById('section-'+t);
    const tb=document.getElementById('tab-'+t);
    if (sec) sec.style.display=t===tab?'block':'none';
    if (tb) tb.classList.toggle('active',t===tab);
  });
  if (tab==='my') renderMyList();
  if (tab==='agent') renderAgentList();
  if (tab==='m1') renderSignList('pending_m1','m1-list');
  if (tab==='m2') renderSignList('pending_m2','m2-list');
  if (tab==='cal') renderCalendar();
};

onAuthStateChanged(auth, async user => {
  if (user && ALLOWED_EMAILS.includes(user.email)) {
    currentUser=user;
    showLoading(false);
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-name').textContent=user.displayName||user.email;
    if (user.photoURL) document.getElementById('user-avatar').src=user.photoURL;
    await loadEmployees();
    await loadLeaves();
    initAgentSelect();
    setDefaultTimes();
    const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth();
    initCalPersonFilter();
    updateAgentCount();
    updateManagerCounts();
  } else if (user) {
    signOut(auth);
    showLoading(false);
    document.getElementById('login-page').style.display='flex';
    document.getElementById('login-error').style.display='block';
  } else {
    showLoading(false);
    document.getElementById('login-page').style.display='flex';
  }
});

window.signIn = async () => {
  try {
    const result=await signInWithPopup(auth,provider);
    if (!ALLOWED_EMAILS.includes(result.user.email)) {
      await signOut(auth);
      document.getElementById('login-error').style.display='block';
    }
  } catch(e) {
    if (e.code==='auth/popup-blocked') {
      document.getElementById('login-error').textContent='請允許彈出視窗';
      document.getElementById('login-error').style.display='block';
    }
  }
};
window.doSignOut = () => signOut(auth);
