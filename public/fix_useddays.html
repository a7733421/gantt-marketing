<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>修正已休天數</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:3rem auto;padding:1rem;background:#f5f6f8}
.card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.btn{background:#4f6ef7;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.log{margin-top:1rem;background:#f0f1f4;border-radius:8px;padding:1rem;font-size:12px;font-family:monospace;height:200px;overflow-y:auto;white-space:pre-wrap}
.ok{color:#2e9e6b}.err{color:#e53935}.info{color:#4f6ef7}
</style>
</head>
<body>
<div class="card">
  <h2>🔧 修正劉舜薇已休天數</h2>
  <p style="font-size:13px;color:#666;margin-bottom:1.5rem">將劉舜薇的已休天數修正回 <strong>1 天</strong>。⚠️ 只需執行一次！</p>
  <button class="btn" id="btn" onclick="runFix()">開始修正</button>
  <div class="log" id="log">等待執行...</div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCCh5iJrxM3wRX3hp9iRLLq2RrFuAV_Zh4",
  authDomain: "gantt-marketing.firebaseapp.com",
  projectId: "gantt-marketing",
});
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

window.runFix = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔐 登入中...', 'info');
  try { await signInWithPopup(auth, provider); } catch(e) { log('❌ 登入失敗', 'err'); btn.disabled=false; return; }
  log('✓ 登入成功', 'ok');
  try {
    const snap = await getDoc(doc(db, 'seniority', 'employees'));
    const emps = JSON.parse(snap.data().list);
    const idx = emps.findIndex(e => e.email === 'vivi7733421@gmail.com');
    if (idx < 0) { log('❌ 找不到劉舜薇', 'err'); return; }
    log(`修正前：${emps[idx].name} usedDays = ${emps[idx].usedDays}`, 'info');
    emps[idx].usedDays = 1;
    await setDoc(doc(db, 'seniority', 'employees'), { list: JSON.stringify(emps), updatedAt: new Date().toISOString() });
    log('✓ 已修正為 1 天', 'ok');
    btn.textContent = '✅ 已完成';
  } catch(e) { log('❌ 失敗：' + e.message, 'err'); btn.disabled=false; }
};
</script>
</body>
</html>
