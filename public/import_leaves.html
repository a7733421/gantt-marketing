function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

window.runImport = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔐 檢查登入狀態...', 'info');

  let user = auth.currentUser;
  if (!user) {
    try {
      const result = await signInWithPopup(auth, provider);
      user = result.user;
    } catch(e) {
      log('❌ 登入失敗：' + e.message, 'err');
      btn.disabled = false;
      return;
    }
  }
  log('✓ 已登入：' + user.email, 'ok');
  log(`\n開始匯入 ${LEAVES.length} 筆假單...\n`, 'info');

  let success = 0, fail = 0;
  for (const r of LEAVES) {
    try {
      await addDoc(collection(db, 'leaves'), {
        applicantName: r.name,
        applicantEmail: r.email || '',
        applicantDept: '',
        type: r.type,
        days: r.days,
        start: r.date + 'T09:00',
        end: r.date + 'T18:00',
        reason: r.reason,
        status: r.status,
        agentName: '（歷史資料）',
        agentName2: '',
        agentEmail: '',
        agentEmail2: '',
        reviewedBy: r.status === 'approved' ? '管理員' : '',
        reviewedAt: r.status === 'approved' ? new Date().toISOString() : '',
        createdAt: r.date + 'T09:00:00.000Z',
        isImported: true,
      });
      log(`✓ ${r.date} ${r.name} ${r.type} ${r.days}天 [${r.status}]`, 'ok');
      success++;
    } catch(e) {
      log(`❌ ${r.date} ${r.name} 失敗：${e.message}`, 'err');
      fail++;
    }
    await new Promise(r => setTimeout(r, 100));
  }

  log(`\n✅ 完成！成功 ${success} 筆，失敗 ${fail} 筆`, 'ok');
  if (fail === 0) {
    log('可以關閉此頁面了。', 'info');
    btn.textContent = '✅ 已完成';
  } else {
    btn.disabled = false;
    btn.textContent = '重試';
  }
};

onAuthStateChanged(auth, user => {
