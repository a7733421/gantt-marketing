<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>假單狀態修正工具</title>
<style>
body{font-family:sans-serif;max-width:600px;margin:3rem auto;padding:1rem;background:#f5f6f8}
.card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{margin-bottom:1rem;font-size:18px}
.btn{background:#4f6ef7;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:1rem;background:#f0f1f4;border-radius:8px;padding:1rem;font-size:12px;font-family:monospace;height:300px;overflow-y:auto;white-space:pre-wrap}
.ok{color:#2e9e6b}.err{color:#e53935}.info{color:#4f6ef7}
</style>
</head>
<body>
<div class="card">
  <h2>🔧 假單狀態修正工具</h2>
  <p style="font-size:13px;color:#666;margin-bottom:1.5rem">
    將所有 <code>status: pending_m1</code> 的假單改為 <code>pending_m2</code>（待經理簽核）。<br>
    ⚠️ 只需執行一次！
  </p>
  <button class="btn" id="btn" onclick="runFix()">開始修正</button>
  <div class="log" id="log">等待執行...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCCh5iJrxM3wRX3hp9iRLLq2RrFuAV_Zh4",
  authDomain: "gantt-marketing.firebaseapp.com",
  projectId: "gantt-marketing",
});
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

window.runFix = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔐 登入中...', 'info');
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    log('❌ 登入失敗：' + e.message, 'err');
    btn.disabled = false;
    return;
  }
  log('✓ 登入成功\n', 'ok');
  log('📋 讀取所有假單...', 'info');
  const snap = await getDocs(collection(db, 'leaves'));
  const toFix = [];
  snap.forEach(d => {
    if (d.data().status === 'pending_m1') toFix.push(d.id);
  });
  log(`找到 ${toFix.length} 筆需要修正\n`, 'info');
  let ok = 0;
  for (const id of toFix) {
    try {
      await updateDoc(doc(db, 'leaves', id), { status: 'pending_m2' });
      log(`✓ ${id} → pending_m2`, 'ok');
      ok++;
    } catch(e) {
      log(`❌ ${id} 失敗：${e.message}`, 'err');
    }
  }
  log(`\n✅ 完成！修正 ${ok} 筆`, 'ok');
  btn.textContent = '✅ 已完成';
};
</script>
</body>
</html>
