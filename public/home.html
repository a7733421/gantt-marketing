<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Gantt — 工具總覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --surface:#ffffff;
  --surface2:#f0f1f4;
  --border:#e4e6eb;
  --border2:#d0d3db;
  --text:#1a1d23;
  --text2:#5a5f6e;
  --text3:#9099aa;
  --accent:#4f6ef7;
  --accent-dim:#eef1fe;
  --orange:#e8622a;
  --orange-dim:#fdf0eb;
  --green:#2e9e6b;
  --green-dim:#ebf7f2;
  --purple:#7c5cbf;
  --purple-dim:#f2eefb;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-hover:0 4px 12px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.08);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

nav{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 2rem;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.nav-logo{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.02em;text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-tag{font-size:11px;background:var(--accent-dim);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:500}

.hero{
  max-width:780px;margin:0 auto;
  padding:4rem 2rem 2.5rem;
  text-align:center;
}
.hero-eyebrow{
  display:inline-block;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);font-weight:600;
  background:var(--accent-dim);padding:4px 14px;border-radius:20px;
  margin-bottom:1.25rem;
}
.hero-title{
  font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:700;
  color:var(--text);
  line-height:1.2;
  margin-bottom:.875rem;
  letter-spacing:-.02em;
}
.hero-sub{
  font-size:15px;color:var(--text2);line-height:1.7;
  max-width:440px;margin:0 auto;
}

.divider{max-width:780px;margin:0 auto;padding:0 2rem;border-top:1px solid var(--border)}

.tools{
  max-width:780px;margin:0 auto;
  padding:2rem 2rem 4rem;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1rem;
}

.tool-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.5rem;
  text-decoration:none;
  color:var(--text);
  display:flex;flex-direction:column;gap:.875rem;
  box-shadow:var(--shadow);
  transition:box-shadow .2s, transform .2s, border-color .2s;
  cursor:pointer;
}
.tool-card:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-3px);
  border-color:var(--card-color,var(--accent));
}
.tool-icon-wrap{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  background:var(--icon-bg);
}
.tool-tag{
  display:inline-block;font-size:10px;
  padding:3px 9px;border-radius:20px;
  font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;
  background:var(--tag-bg);color:var(--tag-color);
  align-self:flex-start;
}
.tool-name{font-size:17px;font-weight:600;margin-bottom:4px;color:var(--text)}
.tool-desc{font-size:13px;color:var(--text2);line-height:1.6;flex:1}
.tool-arrow{
  display:flex;align-items:center;gap:4px;
  font-size:12px;font-weight:500;
  color:var(--card-color,var(--accent));
  margin-top:.25rem;
  transition:gap .15s;
}
.tool-card:hover .tool-arrow{gap:8px}
.tool-card-disabled{opacity:.45;pointer-events:none}

footer{
  border-top:1px solid var(--border);
  text-align:center;padding:1.25rem;
  font-size:12px;color:var(--text3);
  background:var(--surface);
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="home.html"><span>TEAM</span> GANTT</a>
  <span class="nav-tag">內部工具</span>
</nav>

<section class="hero">
  <div class="hero-eyebrow">工具總覽</div>
  <h1 class="hero-title">團隊工具，一個地方管理</h1>
  <p class="hero-sub">從任務進度到出差費用，集中管理，提升效率。</p>
</section>

<div class="divider"></div>

<div class="tools">

  <a class="tool-card" href="/"
     style="--card-color:#4f6ef7;--icon-bg:#eef1fe;--tag-bg:#eef1fe;--tag-color:#4f6ef7">
    <div class="tool-icon-wrap">📊</div>
    <div>
      <div class="tool-tag">專案管理</div>
      <div class="tool-name">工作進度追蹤</div>
      <div class="tool-desc">甘特圖任務管理，依人員、類別、優先順序追蹤所有工作，支援多人協作與 Google 登入。</div>
    </div>
    <div class="tool-arrow">開啟工具 →</div>
  </a>

  <a class="tool-card" href="fuel.html"
     style="--card-color:#e8622a;--icon-bg:#fdf0eb;--tag-bg:#fdf0eb;--tag-color:#e8622a">
    <div class="tool-icon-wrap">⛽</div>
    <div>
      <div class="tool-tag">出差費用</div>
      <div class="tool-name">出差油錢計算</div>
      <div class="tool-desc">支援租車、私家車、公司車三種車型，AI 自動抓取中油油價與計算公里數，可匯出 CSV。</div>
    </div>
    <div class="tool-arrow">開啟工具 →</div>
  </a>

  <div class="tool-card tool-card-disabled"
     style="--card-color:#9099aa;--icon-bg:#f0f1f4;--tag-bg:#f0f1f4;--tag-color:#9099aa">
    <div class="tool-icon-wrap">＋</div>
    <div>
      <div class="tool-tag">即將推出</div>
      <div class="tool-name">更多工具</div>
      <div class="tool-desc">下一個工具開發中，敬請期待。</div>
    </div>
    <div class="tool-arrow" style="color:var(--text3)">開發中</div>
  </div>

</div>

<footer>© 2026 Team Gantt · 內部使用</footer>

</body>
</html>
